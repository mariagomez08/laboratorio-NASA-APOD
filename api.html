<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API NASA</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="api.css">
</head>
<body>

  <div class="container py-5">

    
    <div class="card shadow-lg">

      <!-- Título -->
      <div class="card-header text-center">
        <h1 id="titulo" class="card-title fs-3 mb-0">Cargando título...</h1>
      </div>

      <!-- Imagen -->
      <img
        id="imagen"
        src=""
        alt="Imagen astronómica del día"
        class="card-img-top"
        width="800"
        height="500"
        loading="lazy"
        style="object-fit: cover; max-height: 500px;"
      />

      <div class="card-body">

        <!-- Fecha -->
        <p id="fecha" class="text-muted small mb-3">
          📅 Cargando fecha...
        </p>

        <!-- Descripción -->
        <p id="descripcion" class="card-text mb-4">
          Cargando descripción...
        </p>

        <!-- Botón Favoritos -->
        <button id="btnFavorito" class="btn btn-outline-warning">
          ⭐ Agregar a favoritos
        </button>

      </div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
